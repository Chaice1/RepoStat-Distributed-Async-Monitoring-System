name: CI

on:
  push:
    branches: [main, master]
  pull_request:

jobs:
  proto-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Buf
        uses: bufbuild/buf-setup-action@v1
      - name: Buf Generate and Check Diff
        run: |
         cd repo-stat
         mkdir -p bin
         GOBIN=$(pwd)/bin go install google.golang.org/protobuf/cmd/protoc-gen-go@latest
         GOBIN=$(pwd)/bin go install google.golang.org/grpc/cmd/protoc-gen-go-grpc@v1.6.1
         
          
         buf generate
         git diff --exit-code

  lint-and-unit:
    runs-on: ubuntu-latest
    needs: proto-check
    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.24'
          go-version-file: repo-stat/go.mod
          cache: true

      - name: Lint
        uses: golangci/golangci-lint-action@v6
        with:
          version: latest
          working-directory: repo-stat


 
  e2e-integration:
    runs-on: ubuntu-latest
    needs: lint-and-unit
    steps:
      - uses: actions/checkout@v4
      - name: Run Infrastructure and Tests
        run: make test
        env:
          CONTAINER_RUNTIME: docker
