syntax="proto3";

package processor.proto;


option go_package = "repo-stat/proto/processor;processorpb";

service Processor{
  rpc GetInfoRepo(GetInfoRepoRequest) returns (GetInfoRepoResponse);
  rpc GetInfoRepositories(GetInfoRepositoriesRequest) returns (GetInfoRepositoriesResponse);
  rpc Ping(PingRequest) returns (PingResponse);
}

message GetInfoRepoRequest{
  string repo = 1;
  string owner = 2;
}

message RepoInfo{
  string fullname = 1;
  string description = 2;
  uint64 stargazers = 3;
  uint64 forks = 4;
  string status = 5;
  string createdat = 6;
}

message GetInfoRepoResponse{
  RepoInfo repoinfo = 1;
}

message GetInfoRepositoriesRequest{
  repeated GetInfoRepoRequest req = 1;
}

message GetInfoRepositoriesResponse{
  repeated RepoInfo repositoriesinfo = 1;
}

message PingRequest {
}

message PingResponse {
  string reply = 1;
}